<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoPulse Ghana | National Environmental Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
      
      body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
        background-color: #052e16;
        overflow: hidden;
      }

      .leaflet-container {
        background: #052e16 !important;
      }

      /* Royal Scientific Scrollbar */
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(5, 46, 22, 0.5);
      }
      ::-webkit-scrollbar-thumb {
        background: #fbbf24;
        border-radius: 0px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #f59e0b;
      }

      /* Pulse Animation for Map Markers */
      @keyframes alert-pulse {
        0% {
          stroke-width: 2;
          stroke-opacity: 1;
          fill-opacity: 0.5;
        }
        70% {
          stroke-width: 15;
          stroke-opacity: 0;
          fill-opacity: 0.3;
        }
        100% {
          stroke-width: 2;
          stroke-opacity: 0;
          fill-opacity: 0.5;
        }
      }

      .pulse-marker {
        animation: alert-pulse 2s cubic-bezier(0.24, 0, 0.38, 1) infinite;
      }

      /* High contrast focus styles */
      :focus {
        outline: 2px solid #fbbf24;
        outline-offset: 2px;
      }

      /* Map filter to enhance satellite view contrast slightly */
      .leaflet-tile-container {
        filter: saturate(1.1) contrast(1.05);
      }

      /* Timeline Slider Styling */
      input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 16px;
        width: 16px;
        border-radius: 2px;
        background: #fbbf24;
        cursor: pointer;
        box-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        border: 2px solid #052e16;
      }

      input[type=range]::-moz-range-thumb {
        height: 16px;
        width: 16px;
        border-radius: 2px;
        background: #fbbf24;
        cursor: pointer;
        box-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        border: 2px solid #052e16;
      }
    </style>
